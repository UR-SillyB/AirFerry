name: windows

on:
  push:
    branches: [main]
    paths:
      - 'core/**'
      - 'apps/windows/**'
      - '.github/workflows/windows.yml'
  pull_request:
    paths:
      - 'core/**'
      - 'apps/windows/**'
      - '.github/workflows/windows.yml'
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Rust C ABI 层（跨平台，cargo test --features cffi）─────────────
  # 验证 cffi.rs 的位域打包、句柄生命周期、端到端恢复。在任何 OS 上跑都行，
  # 用 ubuntu 最快最省额度。对标 Android 的 cargo test -p transfer-engine。
  rust-cffi:
    name: Rust C ABI (cffi)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cffi-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cffi-

      - name: cargo test --features cffi (unit)
        run: cargo test -p transfer-engine --features cffi --lib cffi

      - name: cargo test --features cffi (e2e)
        run: cargo test -p transfer-engine --features cffi --test cffi_e2e

      - name: cargo build cdylib smoke (验证 DLL 目标可产出)
        run: cargo build -p transfer-engine --features cffi --release

  # ── Job 2: C# 协议层单元测试（跨平台）────────────────────────────────────
  # 只测纯 C# 逻辑（IngestStatus/FrameHeader/BundleParser/FileNameUtil/Progress），
  # 不依赖 P/Invoke，net8.0 TFM 可在 ubuntu 上跑。
  csharp-tests:
    name: C# protocol tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: dotnet test (AirFerry.Windows.Tests)
        run: |
          cd apps/windows
          dotnet test AirFerry.Windows.Tests/AirFerry.Windows.Tests.csproj -c Release --logger "console;verbosity=normal"

  # ── Job 3: Windows 端完整构建（仅 Windows runner）─────────────────────────
  # WPF (net8.0-windows TFM) 只能在 Windows 上构建。对标 build-windows.ps1：
  # ① cargo build --features cffi → transfer_engine.dll
  # ② dotnet build → AirFerry.exe（含 runtime/ DLL 拷贝）
  # 不在此 job 跑 dotnet test（协议层测试已在 csharp-tests job 跑过，避免重复）。
  windows-build:
    name: Windows build (WPF + Rust DLL)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cffi-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cffi-

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('apps/windows/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Build Rust C ABI DLL (--features cffi)
        run: cargo build -p transfer-engine --features cffi --release

      - name: Copy DLL to C# runtime/
        shell: pwsh
        run: |
          $dll = "target/release/transfer_engine.dll"
          if (-not (Test-Path $dll)) { throw "Rust DLL not found: $dll" }
          New-Item -ItemType Directory -Force -Path apps/windows/AirFerry.Windows/runtime | Out-Null
          Copy-Item $dll apps/windows/AirFerry.Windows/runtime/transfer_engine.dll -Force
          Write-Host "Copied $dll -> runtime/"

      - name: dotnet restore
        run: dotnet restore apps/windows/AirFerry.sln

      - name: dotnet build (WPF Release)
        run: dotnet build apps/windows/AirFerry.Windows/AirFerry.Windows.csproj -c Release --no-restore

  # ── Job 4: Windows 发布打包 + 上传到 GitHub release ──────────────────────
  # 镜像 build-windows.ps1 -Pack：
  # ① cargo build --features cffi → transfer_engine.dll → runtime/
  # ② dotnet publish -r win-x64 single-file self-contained=false → publish/
  # ③ Compress publish/ → airferry-windows-x64-v${VER}.zip
  # ④ gh release upload 到 v${VER}（tag 已存在，--clobber 覆盖同名 asset）
  # 只在 workflow_dispatch + 打包后手动触发上传（避免每次 push 都发 release）。
  # 版本号与 apps/sender/package.json、build.gradle.kts、Cargo.toml、csproj 四处
  # 手动保持同步（AGENTS.md §2.7 关键依赖顺序第 5 条）。发版时改这一处即可。
  windows-pack:
    name: Windows publish + upload to release
    needs: [rust-cffi, csharp-tests, windows-build]
    runs-on: windows-latest
    # 仅在手动触发时跑（不污染 push/PR）；确保质量门（前三个 job）通过。
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write   # gh release upload 需要
    env:
      # Keep in sync with apps/sender/package.json, build.gradle.kts,
      # Cargo.toml workspace version, AirFerry.Windows.csproj <Version>
      # (AGENTS.md §2.8 版本号同步 + Windows 发版).
      VER: '1.1.1'
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cffi-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cffi-

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('apps/windows/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Build Rust C ABI DLL (--features cffi)
        run: cargo build -p transfer-engine --features cffi --release

      - name: Copy DLL to C# runtime/
        shell: pwsh
        run: |
          $dll = "target/release/transfer_engine.dll"
          if (-not (Test-Path $dll)) { throw "Rust DLL not found: $dll" }
          New-Item -ItemType Directory -Force -Path apps/windows/AirFerry.Windows/runtime | Out-Null
          Copy-Item $dll apps/windows/AirFerry.Windows/runtime/transfer_engine.dll -Force
          Write-Host "Copied $dll -> runtime/"

      - name: dotnet restore
        run: dotnet restore apps/windows/AirFerry.sln

      - name: dotnet publish (single-file, win-x64, self-contained=false)
        # 镜像 build-windows.ps1 -Pack：单文件、框架依赖（目标机须装 .NET 8 运行时）
        run: >-
          dotnet publish apps/windows/AirFerry.Windows/AirFerry.Windows.csproj
          -c Release -r win-x64
          -p:PublishSingleFile=true --self-contained false

      - name: Pack zip
        shell: pwsh
        run: |
          # dotnet publish 把单文件产物写到 bin/$(Platform)/$(Configuration)/$(TFM)/$(RID)/publish/。
          # RID 段（win-x64）是否出现取决于 csproj 的 Platform/附带 RID，故不硬编码路径，
          # 而是在 bin 树里递归找 publish 目录（应恰有一个）。
          $BinRoot = "apps/windows/AirFerry.Windows/bin"
          $publishDirs = Get-ChildItem -Path $BinRoot -Recurse -Directory -Filter "publish" -ErrorAction SilentlyContinue
          if ($publishDirs.Count -eq 0) {
            throw "未找到 publish 目录（在 $BinRoot 下递归查找）——dotnet publish 是否真的产出了单文件？"
          }
          if ($publishDirs.Count -gt 1) {
            # 多个 publish 目录时挑最深/最新的那个，并打印警告以便日志核对。
            Write-Host "WARN: 找到 $($publishDirs.Count) 个 publish 目录，取最后一个："
            $publishDirs | ForEach-Object { Write-Host "  - $($_.FullName)" }
          }
          $PublishDir = $publishDirs[-1].FullName
          Write-Host "=== publish 目录: $PublishDir ==="
          # 列出产物清单（便于日志核对：应含 AirFerry.exe + transfer_engine.dll + OpenCV native DLLs）
          Write-Host "=== publish 内容 ==="
          Get-ChildItem $PublishDir | Select-Object Name, Length | Format-Table -AutoSize
          $ZipName = "airferry-windows-x64-v${env:VER}.zip"
          if (Test-Path $ZipName) { Remove-Item $ZipName -Force }
          Compress-Archive -Path "$PublishDir/*" -DestinationPath $ZipName
          Write-Host "Windows 端 -> $ZipName ($((Get-Item $ZipName).Length) bytes)"

      - name: Upload to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $ZipName = "airferry-windows-x64-v${env:VER}.zip"
          $Tag = "v${env:VER}"
          # Prefer an existing release tag (created when packaging sender/APK).
          # If missing, create a draft release so upload still works when Windows
          # is packed first via workflow_dispatch.
          $exists = gh release view $Tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Release $Tag not found — creating draft"
            gh release create $Tag --draft --title $Tag --notes "Windows build from CI (workflow_dispatch)"
          }
          # --clobber：覆盖同名 asset（覆盖式发布）。
          gh release upload $Tag $ZipName --clobber
          Write-Host "已上传 $ZipName 到 release $Tag"

